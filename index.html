<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT · S3GAD3</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07090d;
  --s1:       #0d1018;
  --s2:       #131720;
  --s3:       #191e2a;
  --b1:       #1d2536;
  --b2:       #252e42;
  --text:     #e0e8f4;
  --text2:    #8599b8;
  --muted:    #3d5070;
  --accent:   #00d4ff;
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --purple:   #a78bfa;
  --pink:     #fb7185;
  --orange:   #fb923c;
  --teal:     #2dd4bf;
  --lime:     #84cc16;
  --sky:      #38bdf8;
  --rose:     #f43f5e;
  --yellow:   #fbbf24;
  --indigo:   #818cf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:15px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.015) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0;
}

/* ── HEADER ─────────────────────────────────────────── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(7,9,13,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  padding:0 28px;display:flex;align-items:center;gap:20px;height:60px;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:19px;
  letter-spacing:.07em;color:var(--accent);
  text-shadow:0 0 30px rgba(0,212,255,.35);
  white-space:nowrap;flex-shrink:0;
}
.logo em{color:var(--muted);font-style:normal;font-weight:600;}
.search-wrap{flex:1;max-width:480px;position:relative;}
#searchInput{
  width:100%;background:var(--s2);border:1px solid var(--b2);
  border-radius:8px;padding:9px 36px 9px 38px;
  color:var(--text);font-family:inherit;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.08);}
#searchInput::placeholder{color:var(--muted);}
.s-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
#clearBtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:none;padding:2px 5px;font-family:inherit;}
#clearBtn:hover{color:var(--text);}
.hstats{margin-left:auto;font-size:13px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.hstats b{color:var(--accent);}

/* ── SECTION NAV ─────────────────────────────────────── */
.sec-nav{
  position:sticky;top:60px;z-index:190;
  background:rgba(7,9,13,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  padding:0 28px;display:flex;gap:4px;
  overflow-x:auto;scrollbar-width:none;height:48px;align-items:center;
}
.sec-nav::-webkit-scrollbar{display:none;}
.sec-pill{
  background:none;border:1px solid transparent;border-radius:20px;
  padding:5px 14px;font-family:inherit;font-size:12px;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .15s;letter-spacing:.04em;text-transform:uppercase;
}
.sec-pill:hover{color:var(--text);border-color:var(--b2);}
.sec-pill.active{border-color:currentColor;background:rgba(255,255,255,.04);}

/* ── MAIN ────────────────────────────────────────────── */
main{position:relative;z-index:1;padding:30px 28px 80px;max-width:1500px;margin:0 auto;}

/* ── SECTION BLOCK ───────────────────────────────────── */
.sec-block{margin-bottom:48px;animation:fadeUp .3s ease both;}
.sec-block.hidden{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sec-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;padding-bottom:12px;
  border-bottom:1px solid var(--b1);
}
.sec-num{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.14em;flex-shrink:0;}
.sec-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;}
.sec-count{margin-left:auto;font-size:11px;color:var(--muted);background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:3px 11px;white-space:nowrap;}

/* ── SUB-TABS ────────────────────────────────────────── */
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.sub-tab{
  background:none;border:1px solid var(--b1);border-radius:6px;
  padding:5px 13px;font-family:inherit;font-size:12px;
  color:var(--muted);cursor:pointer;transition:all .15s;
  letter-spacing:.04em;white-space:nowrap;
}
.sub-tab:hover{color:var(--text);border-color:var(--b2);}
.sub-tab.active{border-color:currentColor;background:rgba(255,255,255,.04);}
.sub-panel{display:none;}
.sub-panel.active{display:block;}

/* ── LINKS GRID ──────────────────────────────────────── */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:6px;}

/* ── LINK CARD ───────────────────────────────────────── */
.link-card{
  display:flex;align-items:center;gap:10px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:11px 13px;
  text-decoration:none;color:var(--text);
  transition:all .15s;min-width:0;position:relative;
  cursor:pointer;
}
.link-card:hover{background:var(--s2);border-color:var(--hc,var(--accent));transform:translateX(3px);}
.link-card:hover .lname{color:var(--hc,var(--accent));}
.link-card:hover .card-arrow{color:var(--hc,var(--accent));}
.link-favicon{width:16px;height:16px;border-radius:3px;flex-shrink:0;object-fit:contain;}
.ltext{flex:1;min-width:0;}
.lname{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;transition:color .15s;font-weight:600;}
.ldesc{display:block;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.card-btns{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.info-btn{
  width:20px;height:20px;border-radius:5px;
  background:var(--s2);border:1px solid var(--b2);
  color:var(--muted);font-size:11px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:inherit;font-weight:700;
  flex-shrink:0;user-select:none;
}
.info-btn:hover{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
.card-arrow{color:var(--b2);font-size:11px;transition:color .15s;}

/* ── TOOLTIP ─────────────────────────────────────────── */
.tooltip{
  position:absolute;bottom:calc(100% + 10px);left:50%;
  transform:translateX(-50%);
  background:var(--s3);border:1px solid var(--b2);
  border-radius:8px;padding:10px 14px;
  font-size:12.5px;color:var(--text2);line-height:1.6;
  width:270px;z-index:600;pointer-events:none;
  opacity:0;transition:opacity .15s;
  box-shadow:0 8px 28px rgba(0,0,0,.6);text-align:left;
}
.tooltip::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);border:6px solid transparent;
  border-top-color:var(--b2);
}
.link-card:hover .tooltip{opacity:1;}

/* ── DORK CARDS ──────────────────────────────────────── */
.dorks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px;}
.dork-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:9px;
}
.dork-label{font-size:13px;color:var(--text2);font-weight:600;}
.dork-code{
  font-size:12px;color:var(--amber);background:var(--s3);
  border:1px solid var(--b2);border-radius:6px;
  padding:8px 11px;word-break:break-all;line-height:1.6;
}
.dork-actions{display:flex;gap:7px;}
.dork-btn{
  flex:1;padding:6px 0;border-radius:6px;font-family:inherit;
  font-size:12px;cursor:pointer;transition:all .15s;border:1px solid var(--b2);
}
.dork-copy{background:var(--s2);color:var(--muted);}
.dork-copy:hover{border-color:var(--accent);color:var(--accent);}
.dork-copy.copied{border-color:var(--green);color:var(--green);}
.dork-run{background:rgba(0,212,255,.08);color:var(--accent);border-color:rgba(0,212,255,.3);}
.dork-run:hover{background:rgba(0,212,255,.18);}

/* ── TRAINING CARDS ──────────────────────────────────── */
.training-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.training-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:10px;overflow:hidden;text-decoration:none;
  color:var(--text);transition:all .2s;display:flex;flex-direction:column;
}
.training-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.45);}
.t-thumb{
  height:80px;background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  position:relative;font-size:30px;color:var(--muted);
}
.t-type{
  position:absolute;top:8px;left:8px;font-size:9px;
  text-transform:uppercase;letter-spacing:.08em;
  padding:2px 8px;border-radius:3px;font-weight:700;
}
.type-yt{background:rgba(239,68,68,.8);color:#fff;}
.type-doc{background:rgba(245,158,11,.8);color:#000;}
.type-course{background:rgba(16,185,129,.8);color:#000;}
.t-info{padding:12px 14px;flex:1;}
.t-title{font-size:13.5px;font-weight:700;line-height:1.4;margin-bottom:5px;}
.t-desc{font-size:12px;color:var(--text2);line-height:1.5;}

/* ── INFO PANEL ──────────────────────────────────────── */
#infoPanel{
  position:fixed;right:0;top:0;bottom:0;width:340px;z-index:1000;
  background:var(--s1);border-left:1px solid var(--b2);
  transform:translateX(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-12px 0 40px rgba(0,0,0,.6);
  pointer-events:none;
}
#infoPanel.open{transform:translateX(0);pointer-events:all;}
.panel-hdr{
  padding:20px 20px 16px;border-bottom:1px solid var(--b1);
  display:flex;align-items:flex-start;gap:12px;
}
.panel-fav{width:24px;height:24px;border-radius:5px;object-fit:contain;flex-shrink:0;}
.panel-tw{flex:1;min-width:0;}
.panel-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.3;}
.panel-domain{font-size:11px;color:var(--muted);margin-top:3px;}
.panel-close{
  background:none;border:1px solid var(--b2);border-radius:5px;
  color:var(--muted);font-size:14px;cursor:pointer;
  padding:4px 9px;font-family:inherit;transition:all .15s;flex-shrink:0;
}
.panel-close:hover{color:var(--text);}
.panel-body{flex:1;overflow-y:auto;padding:18px 20px;}
.plabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.pdesc{
  font-size:13px;line-height:1.7;color:var(--text2);
  background:var(--s2);border:1px solid var(--b1);
  border-radius:7px;padding:12px 14px;margin-bottom:16px;
}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.ptag{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--b2);color:var(--muted);background:var(--s2);}
.panel-go{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;background:rgba(0,212,255,.1);
  border:1px solid var(--accent);border-radius:8px;
  color:var(--accent);font-family:inherit;font-size:13px;
  cursor:pointer;text-decoration:none;transition:all .15s;font-weight:700;
}
.panel-go:hover{background:rgba(0,212,255,.2);}

/* ── NO RESULTS ──────────────────────────────────────── */
.no-results{text-align:center;color:var(--muted);font-size:15px;padding:70px 0;}
.no-results b{color:var(--accent);}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:700px){
  header{padding:0 14px;gap:12px;}
  .hstats{display:none;}
  main{padding:20px 14px 60px;}
  .sec-nav{padding:0 14px;}
  .links-grid,.dorks-grid,.training-grid{grid-template-columns:1fr;}
  #infoPanel{width:100%;}
}
</style>
</head>

      {name:'Bellingcat Online Investigation Toolkit',url:'https://docs.google.com/spreadsheets/d/18rtqh8EG2q1xBo2cLNyhIDuK9jrPGwYr9DI2UncoqJQ',type:'doc',desc:'Hoja con más de 500 herramientas OSINT organizadas por categoría. La referencia del sector.',tags:['directorio','500+ herramientas','referencia']},
      {name:'OSINT Framework',url:'https://osintframework.com',type:'doc',desc:'Árbol interactivo de herramientas OSINT organizadas por tipo de investigación.',tags:['framework','directorio','interactivo']},
      {name:'Guía búsqueda avanzada LinkedIn',url:'https://nubela.co/blog/how-to-find-anyone-with-an-advanced-linkedin-people-search/',type:'doc',desc:'Guía completa para encontrar a cualquier persona usando la búsqueda avanzada de LinkedIn.',tags:['linkedin','guía','búsqueda']},
      {name:'Phishing Investigation OSINT',url:'https://osintteam.blog/from-inbox-to-intel-a-deep-dive-into-phishing-investigation-via-osint-d0c7ece36070',type:'doc',desc:'Guía profunda sobre investigación de phishing usando técnicas OSINT.',tags:['phishing','investigación','guía']},
      {name:'Trace Labs CTF',url:'https://www.tracelabs.org',type:'course',desc:'CTF OSINT para búsqueda de personas desaparecidas. Formación práctica con impacto real.',tags:['CTF','práctica','personas']},
    ]},
  ]
},
];

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
let total = 0;
SECTIONS.forEach(s => {
  s.subs.forEach(sub => {
    if (!sub.isDorks && sub.links) total += sub.links.length;
  });
});
document.getElementById('totalCount').textContent = total;

// Build nav
const secNav = document.getElementById('secNav');
SECTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sec-pill';
  btn.dataset.sec = s.id;
  btn.style.color = s.color;
  btn.textContent = s.title;
  secNav.appendChild(btn);
});

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function fav(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return ''; }
}

function makeLinkCard(link, color) {
  const f = fav(link.url);
  const card = document.createElement('a');
  card.className = 'link-card';
  card.href = link.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.setProperty('--hc', color);
  card.innerHTML = `
    <img class="link-favicon" src="${f}" alt="" onerror="this.style.visibility='hidden'">
    <div class="ltext">
      <span class="lname">${link.name}</span>
      <span class="ldesc">${link.desc}</span>
    </div>
    <div class="card-btns">
      <span class="info-btn" role="button" tabindex="0" title="Más info">i</span>
      <span class="card-arrow">↗</span>
    </div>
    <div class="tooltip">${link.desc}</div>
  `;
  card.querySelector('.info-btn').addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    openPanel(link, color, f);
  });
  return card;
}

function makeDorkCard(dork, color) {
  const card = document.createElement('div');
  card.className = 'dork-card';
  card.innerHTML = `
    <div class="dork-label">${dork.label}</div>
    <div class="dork-code">${dork.query}</div>
    <div class="dork-actions">
      <button class="dork-btn dork-copy">📋 Copiar</button>
      <button class="dork-btn dork-run" style="border-color:${color}44;color:${color}">▶ Ejecutar en Google</button>
    </div>
  `;
  const copyBtn = card.querySelector('.dork-copy');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(dork.query).then(() => {
      copyBtn.textContent = '✓ Copiado';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '📋 Copiar'; copyBtn.classList.remove('copied'); }, 2000);
    });
  });
  card.querySelector('.dork-run').addEventListener('click', () => {
    window.open(`https://www.google.com/search?q=${encodeURIComponent(dork.query)}`, '_blank');
  });
  return card;
}

function makeExtCard(link) {
  const bClass = link.browser==='chrome'?'br-chrome':link.browser==='firefox'?'br-firefox':'br-multi';
  const bLabel = link.browser==='chrome'?'Chrome':link.browser==='firefox'?'Firefox':'Multi';
  const card = document.createElement('div');
  card.style.cssText='background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;';
  card.innerHTML=`
    <div style="width:36px;height:36px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${link.icon||'🔧'}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${link.name} <span style="font-size:10px;padding:2px 7px;border-radius:3px;margin-left:4px" class="${bClass}">${bLabel}</span></div>
      <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px">${link.desc}</div>
      <a href="${link.url}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);border:1px solid rgba(0,212,255,.25);border-radius:4px;padding:3px 9px;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(0,212,255,.15)'" onmouseout="this.style.background='none'">↗ Instalar</a>
    </div>
  `;
  return card;
}

function makeTrainingCard(link) {
  const tc = link.type==='yt'?'type-yt':link.type==='course'?'type-course':'type-doc';
  const tl = link.type==='yt'?'▶ YouTube':link.type==='course'?'★ Curso':'📄 Doc';
  const ic = link.type==='yt'?'▶':link.type==='course'?'★':'📄';
  const card = document.createElement('a');
  card.className = 'training-card';
  card.href = link.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.innerHTML = `
    <div class="t-thumb">${ic}<span class="t-type ${tc}">${tl}</span></div>
    <div class="t-info">
      <div class="t-title">${link.name}</div>
      <div class="t-desc">${link.desc}</div>
    </div>
  `;
  return card;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
const mainEl = document.getElementById('main');

function renderSection(sec, q) {
  const block = document.createElement('div');
  block.className = 'sec-block';
  block.id = sec.id;

  let cnt = 0;
  sec.subs.forEach(sub => { if (!sub.isDorks && sub.links) cnt += sub.links.length; });

  block.innerHTML = `
    <div class="sec-header">
      <span class="sec-num">${sec.num}</span>
      <h2 class="sec-title" style="color:${sec.color}">${sec.title}</h2>
      <span class="sec-count">${cnt} recursos</span>
    </div>
  `;

  const tabsWrap = document.createElement('div');
  tabsWrap.className = 'sub-tabs';
  const panelsWrap = document.createElement('div');

  sec.subs.forEach((sub, idx) => {
    // Build tab
    const tab = document.createElement('button');
    tab.className = 'sub-tab' + (idx===0?' active':'');
    tab.style.color = (idx===0||sub.isDorks) ? sec.color : '';
    tab.textContent = sub.label;
    tab.dataset.idx = idx;
    tabsWrap.appendChild(tab);

    // Build panel
    const panel = document.createElement('div');
    panel.className = 'sub-panel' + (idx===0?' active':'');
    panel.dataset.idx = idx;

    if (sub.isDorks) {
      const grid = document.createElement('div');
      grid.className = 'dorks-grid';
      (sub.dorks||[]).forEach(d => grid.appendChild(makeDorkCard(d, sec.color)));
      panel.appendChild(grid);
    } else if (sec.isExtensions) {
      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px';
      (sub.links||[]).forEach(l => grid.appendChild(makeExtCard(l)));
      panel.appendChild(grid);
    } else if (sec.isTraining) {
      const grid = document.createElement('div');
      grid.className = 'training-grid';
      (sub.links||[]).forEach(l => grid.appendChild(makeTrainingCard(l)));
      panel.appendChild(grid);
    } else {
      const links = q ? (sub.links||[]).filter(l =>
        l.name.toLowerCase().includes(q) ||
        l.desc.toLowerCase().includes(q) ||
        (l.tags||[]).some(t => t.toLowerCase().includes(q))
      ) : (sub.links||[]);
      if (q && links.length===0) { panel.style.display='none'; }
      const grid = document.createElement('div');
      grid.className = 'links-grid';
      links.forEach(l => grid.appendChild(makeLinkCard(l, sec.color)));
      panel.appendChild(grid);
    }
    panelsWrap.appendChild(panel);
  });

  // Tab switching
  tabsWrap.querySelectorAll('.sub-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      tabsWrap.querySelectorAll('.sub-tab').forEach(t => { t.classList.remove('active'); t.style.color=''; });
      panelsWrap.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      tab.style.color = sec.color;
      const target = panelsWrap.querySelector(`[data-idx="${tab.dataset.idx}"]`);
      if (target) target.classList.add('active');
    });
  });

  block.appendChild(tabsWrap);
  block.appendChild(panelsWrap);
  return block;
}

function render(q='', filterSec='all') {
  mainEl.innerHTML = '';
  const sq = q.toLowerCase().trim();

  SECTIONS.forEach(sec => {
    if (filterSec!=='all' && sec.id!==filterSec) return;
    if (sq && !sec.isTraining && !sec.isExtensions) {
      const has = sec.subs.some(sub => !sub.isDorks && (sub.links||[]).some(l =>
        l.name.toLowerCase().includes(sq) ||
        l.desc.toLowerCase().includes(sq) ||
        (l.tags||[]).some(t => t.toLowerCase().includes(sq))
      ));
      if (!has) return;
    }
    mainEl.appendChild(renderSection(sec, sq||null));
  });

  if (mainEl.children.length===0) {
    mainEl.innerHTML = `<div class="no-results">Sin resultados para "<b>${q}</b>"</div>`;
  }

  const si = document.getElementById('searchInfo');
  const fc = document.getElementById('foundCount');
  if (sq) { si.style.display=''; fc.textContent=mainEl.children.length; }
  else si.style.display='none';
}

render();

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
let activeSec = 'all';
secNav.addEventListener('click', e => {
  const pill = e.target.closest('.sec-pill');
  if (!pill) return;
  secNav.querySelectorAll('.sec-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeSec = pill.dataset.sec;
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('searchInfo').style.display = 'none';
  render('', activeSec);
  if (activeSec!=='all') {
    const el = document.getElementById(activeSec);
    if (el) setTimeout(() => el.scrollIntoView({behavior:'smooth',block:'start'}), 50);
  }
});

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
searchInput.addEventListener('input', () => {
  const v = searchInput.value;
  clearBtn.style.display = v ? '' : 'none';
  secNav.querySelectorAll('.sec-pill').forEach(p => p.classList.remove('active'));
  secNav.querySelector('[data-sec="all"]').classList.add('active');
  activeSec = 'all';
  render(v, 'all');
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  document.getElementById('searchInfo').style.display = 'none';
  render('', 'all');
});

// ═══════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════
const panel = document.getElementById('infoPanel');
document.getElementById('panelClose').addEventListener('click', () => panel.classList.remove('open'));
document.addEventListener('click', e => {
  if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.info-btn')) {
    panel.classList.remove('open');
  }
});

function openPanel(link, color, favicon) {
  document.getElementById('pFav').src = favicon;
  document.getElementById('pTitle').textContent = link.name;
  document.getElementById('pTitle').style.color = color;
  try { document.getElementById('pDomain').textContent = new URL(link.url).hostname; } catch {}
  document.getElementById('pDesc').textContent = link.desc;
  const tagsEl = document.getElementById('pTags');
  tagsEl.innerHTML = (link.tags||[]).map(t =>
    `<span class="ptag" style="border-color:${color}44;color:${color}">${t}</span>`
  ).join('');
  const go = document.getElementById('pLink');
  go.href = link.url;
  go.style.borderColor = color;
  go.style.color = color;
  go.style.background = color + '18';
  panel.classList.add('open');
}

extStyle.textContent = '.br-chrome{background:rgba(251,191,36,.15);color:#f59e0b;border:1px solid rgba(251,191,36,.3);padding:1px 6px;border-radius:3px;} .br-firefox{background:rgba(251,113,133,.15);color:#fb7185;border:1px solid rgba(251,113,133,.3);padding:1px 6px;border-radius:3px;} .br-multi{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.25);padding:1px 6px;border-radius:3px;}';
document.head.appendChild(extStyle);
