<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT · S3GAD3</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f; --surface:#0d1017; --surface2:#121620; --surface3:#181d28;
  --border:#1c2230; --border2:#232b3a;
  --accent:#00d4ff; --accent-dim:rgba(0,212,255,.1);
  --green:#10b981; --amber:#f59e0b; --red:#ef4444;
  --purple:#a78bfa; --pink:#fb7185; --blue:#60a5fa;
  --orange:#fb923c; --teal:#2dd4bf; --lime:#a3e635;
  --yellow:#fbbf24; --rose:#f43f5e; --sky:#38bdf8;
  --text:#dde4ee; --text2:#7a8fa8; --muted:#3d4f63;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:300;background:rgba(8,11,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:.07em;color:var(--accent);text-shadow:0 0 28px rgba(0,212,255,.3);white-space:nowrap;flex-shrink:0;}
.logo em{color:var(--muted);font-style:normal;font-weight:400;}
.search-wrap{flex:1;max-width:440px;position:relative;}
#searchInput{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:7px 34px 7px 34px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.02em;}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.07);}
#searchInput::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.s-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;cursor:pointer;display:none;background:none;border:none;padding:2px 4px;transition:color .15s;font-family:inherit;}
.s-clear:hover{color:var(--text);}
.hstats{margin-left:auto;font-size:10.5px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.hstats b{color:var(--accent);}

/* SECTION NAV */
.sec-nav{position:sticky;top:56px;z-index:290;background:rgba(8,11,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;height:44px;align-items:center;}
.sec-nav::-webkit-scrollbar{display:none;}
.sec-pill{background:none;border:1px solid transparent;border-radius:20px;padding:3px 12px;font-family:inherit;font-size:10px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.05em;text-transform:uppercase;}
.sec-pill:hover{color:var(--text);border-color:var(--border2);}
.sec-pill.active{border-color:currentColor;background:rgba(255,255,255,.04);}

/* MAIN */
main{position:relative;z-index:1;padding:28px 24px 80px;max-width:1440px;margin:0 auto;}

/* SECTION BLOCK */
.sec-block{margin-bottom:44px;animation:fadeUp .3s ease both;}
.sec-block.hidden{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.sec-num{font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:.12em;flex-shrink:0;}
.sec-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.sec-total{margin-left:auto;font-size:9.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 9px;white-space:nowrap;}

/* SUB-TABS */
.sub-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.sub-tab{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 11px;font-family:inherit;font-size:10px;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.05em;white-space:nowrap;}
.sub-tab:hover{color:var(--text);border-color:var(--border2);}
.sub-tab.active{border-color:currentColor;background:rgba(255,255,255,.04);}

/* SUB-PANEL */
.sub-panel{display:none;}
.sub-panel.active{display:block;}

/* LINKS GRID */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:5px;}

/* CARD */
.link-card{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 10px;text-decoration:none;color:var(--text);font-size:11.5px;transition:all .15s;min-width:0;position:relative;}
.link-card:hover{background:var(--surface2);border-color:var(--hc,var(--accent));transform:translateX(2px);}
.link-card:hover .lname{color:var(--hc,var(--accent));}
.link-card:hover .card-arrow{color:var(--hc,var(--accent));}
.link-favicon{width:15px;height:15px;border-radius:3px;flex-shrink:0;object-fit:contain;}
.ltext{flex:1;min-width:0;}
.lname{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s;}
.ldesc{display:block;font-size:9.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.card-btns{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.info-btn{width:18px;height:18px;border-radius:4px;background:var(--surface3);border:1px solid var(--border2);color:var(--muted);font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;font-weight:700;flex-shrink:0;user-select:none;}
.info-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.card-arrow{color:var(--border2);font-size:10px;transition:color .15s;}

/* TOOLTIP */
.tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;font-size:10.5px;color:var(--text2);line-height:1.55;width:255px;z-index:500;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.55);text-align:left;}
.tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border2);}
.link-card:hover .tooltip{opacity:1;}

/* DORK CARDS */
.dorks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px;}
.dork-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.dork-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.04em;}
.dork-code{font-size:11px;color:var(--amber);background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:7px 10px;word-break:break-all;line-height:1.5;font-family:'JetBrains Mono',monospace;}
.dork-actions{display:flex;gap:6px;}
.dork-btn{flex:1;padding:5px 0;border-radius:5px;font-family:inherit;font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.04em;border:1px solid var(--border2);}
.dork-copy{background:var(--surface2);color:var(--muted);}
.dork-copy:hover{border-color:var(--accent);color:var(--accent);}
.dork-copy.copied{border-color:var(--green);color:var(--green);}
.dork-run{background:rgba(0,212,255,.08);color:var(--accent);border-color:rgba(0,212,255,.3);}
.dork-run:hover{background:rgba(0,212,255,.18);}

/* EXTENSION CARDS */
.ext-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:5px;}
.ext-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;}
.ext-icon{width:32px;height:32px;border-radius:7px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;}
.ext-body{flex:1;min-width:0;}
.ext-name{font-size:12px;font-weight:600;margin-bottom:3px;}
.ext-desc{font-size:10px;color:var(--muted);line-height:1.5;}
.ext-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:9.5px;color:var(--accent);text-decoration:none;border:1px solid rgba(0,212,255,.25);border-radius:4px;padding:2px 8px;transition:all .15s;}
.ext-link:hover{background:var(--accent-dim);}
.ext-browser{font-size:8.5px;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle;}
.br-chrome{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.3);}
.br-firefox{background:rgba(251,113,133,.15);color:var(--pink);border:1px solid rgba(251,113,133,.3);}
.br-multi{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.25);}

/* TRAINING */
.training-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;}
.training-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;text-decoration:none;color:var(--text);transition:all .2s;display:flex;flex-direction:column;}
.training-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.t-thumb{height:90px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.t-placeholder{font-size:28px;color:var(--muted);}
.t-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);opacity:0;transition:opacity .2s;}
.training-card:hover .t-play{opacity:1;}
.play-circle{width:36px;height:36px;border-radius:50%;background:rgba(0,212,255,.9);display:flex;align-items:center;justify-content:center;font-size:14px;padding-left:2px;}
.t-type{position:absolute;top:7px;left:7px;font-size:8.5px;text-transform:uppercase;letter-spacing:.07em;padding:2px 6px;border-radius:3px;font-weight:700;}
.type-yt{background:rgba(239,68,68,.8);color:#fff;}
.type-doc{background:rgba(245,158,11,.8);color:#000;}
.type-course{background:rgba(16,185,129,.8);color:#000;}
.t-info{padding:10px 12px;flex:1;}
.t-title{font-size:11.5px;font-weight:600;line-height:1.4;margin-bottom:4px;}
.t-desc{font-size:10px;color:var(--text2);line-height:1.5;}

/* INFO PANEL */
#infoPanel{position:fixed;right:0;top:0;bottom:0;width:320px;z-index:1000;background:var(--surface);border-left:1px solid var(--border2);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.6);pointer-events:none;}
#infoPanel.open{pointer-events:all;}
#infoPanel.open{transform:translateX(0);}
.panel-hdr{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;}
.panel-fav{width:22px;height:22px;border-radius:4px;object-fit:contain;flex-shrink:0;}
.panel-tw{flex:1;min-width:0;}
.panel-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.3;}
.panel-domain{font-size:9.5px;color:var(--muted);margin-top:2px;}
.panel-close{background:none;border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-size:13px;cursor:pointer;padding:3px 7px;font-family:inherit;transition:all .15s;flex-shrink:0;}
.panel-close:hover{color:var(--text);}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px;}
.plabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;}
.pdesc{font-size:11px;line-height:1.7;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:11px 13px;margin-bottom:14px;}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.ptag{font-size:9.5px;padding:2px 8px;border-radius:10px;border:1px solid var(--border2);color:var(--muted);background:var(--surface2);}
.panel-go{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:7px;color:var(--accent);font-family:inherit;font-size:11.5px;cursor:pointer;text-decoration:none;transition:all .15s;letter-spacing:.04em;}
.panel-go:hover{background:rgba(0,212,255,.2);}

/* NO RESULTS */
.no-results{text-align:center;color:var(--muted);font-size:13px;padding:60px 0;}
.no-results b{color:var(--accent);}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

@media(max-width:640px){
  header{padding:0 12px;gap:10px;}
  .hstats{display:none;}
  main{padding:18px 12px 60px;}
  .sec-nav{padding:0 12px;}
  .links-grid,.dorks-grid,.ext-grid,.training-grid{grid-template-columns:1fr;}
  #infoPanel{width:100%;}
}

/* ══ ADMIN MODE ══════════════════════════════════ */
.admin-btn {
  margin-left:8px; padding:4px 12px;
  background:none; border:1px solid var(--border2);
  border-radius:20px; font-family:inherit; font-size:10px;
  color:var(--muted); cursor:pointer; transition:all .15s;
  letter-spacing:.05em; text-transform:uppercase; flex-shrink:0;
}
.admin-btn:hover { color:var(--amber); border-color:var(--amber); }
.admin-btn.active { color:var(--amber); border-color:var(--amber); background:rgba(245,158,11,.08); }

/* LOGIN MODAL */
#adminModal {
  display:none; position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  pointer-events:none;
}
#adminModal.open { pointer-events:all; }
#adminModal.open { display:flex; }
.modal-box {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; padding:32px 28px; width:320px;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
}
.modal-title {
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  color:var(--amber); margin-bottom:6px; letter-spacing:.05em;
}
.modal-sub { font-size:11px; color:var(--muted); margin-bottom:20px; }
.modal-input {
  width:100%; background:var(--surface2); border:1px solid var(--border2);
  border-radius:7px; padding:9px 12px; color:var(--text);
  font-family:inherit; font-size:13px; outline:none; margin-bottom:12px;
  transition:border-color .2s;
}
.modal-input:focus { border-color:var(--amber); }
.modal-btns { display:flex; gap:8px; }
.modal-confirm {
  flex:1; padding:9px; border-radius:7px; font-family:inherit;
  font-size:12px; cursor:pointer; transition:all .15s;
  background:rgba(245,158,11,.12); border:1px solid var(--amber);
  color:var(--amber); font-weight:600; letter-spacing:.04em;
}
.modal-confirm:hover { background:rgba(245,158,11,.25); }
.modal-cancel {
  padding:9px 14px; border-radius:7px; font-family:inherit;
  font-size:12px; cursor:pointer; background:none;
  border:1px solid var(--border2); color:var(--muted); transition:all .15s;
}
.modal-cancel:hover { color:var(--text); border-color:var(--text2); }
.modal-err { font-size:11px; color:var(--red); margin-top:6px; display:none; }

/* ADMIN OVERLAY on cards */
body.admin-mode .link-card { border-color:rgba(245,158,11,.2); }
body.admin-mode .link-card:hover { border-color:var(--amber); }

/* ADMIN EDIT PANEL */
#adminPanel {
  position:fixed; right:0; top:0; bottom:0; width:400px; z-index:1500;
  background:var(--surface); border-left:1px solid var(--amber);
  transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
  box-shadow:-12px 0 40px rgba(245,158,11,.12);
  pointer-events:none;
}
#adminPanel.open { transform:translateX(0); pointer-events:all; }
.ap-header {
  padding:18px 20px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.ap-title {
  font-family:'Syne',sans-serif; font-size:13px; font-weight:800;
  color:var(--amber); flex:1;
}
.ap-close {
  background:none; border:1px solid var(--border2); border-radius:5px;
  color:var(--muted); font-size:13px; cursor:pointer; padding:3px 8px;
  font-family:inherit; transition:all .15s;
}
.ap-close:hover { color:var(--text); }
.ap-tabs {
  display:flex; border-bottom:1px solid var(--border);
  padding:0 20px; gap:4px;
}
.ap-tab {
  background:none; border:none; border-bottom:2px solid transparent;
  padding:10px 12px; font-family:inherit; font-size:10.5px;
  color:var(--muted); cursor:pointer; letter-spacing:.05em; text-transform:uppercase;
  transition:all .15s; margin-bottom:-1px;
}
.ap-tab:hover { color:var(--text); }
.ap-tab.active { color:var(--amber); border-bottom-color:var(--amber); }
.ap-body { flex:1; overflow-y:auto; padding:16px 20px; }
.ap-section-title {
  font-size:9px; color:var(--muted); text-transform:uppercase;
  letter-spacing:.12em; margin:14px 0 8px; font-weight:600;
}
.ap-section-title:first-child { margin-top:0; }

/* LINK EDIT ROW */
.edit-row {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:7px; padding:10px 12px; margin-bottom:6px;
  transition:border-color .15s;
}
.edit-row:hover { border-color:var(--border2); }
.edit-row-header {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
}
.edit-row-name {
  flex:1; font-size:11.5px; font-weight:600; color:var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.edit-status {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:var(--muted);
}
.edit-status.ok { background:var(--green); }
.edit-status.error { background:var(--red); }
.edit-status.checking { background:var(--amber); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.edit-url-wrap { display:flex; gap:6px; align-items:center; }
.edit-url {
  flex:1; background:var(--surface3); border:1px solid var(--border2);
  border-radius:5px; padding:6px 9px; color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:10.5px;
  outline:none; transition:border-color .2s;
}
.edit-url:focus { border-color:var(--amber); }
.edit-url.url-error { border-color:var(--red); }
.edit-url.url-ok { border-color:var(--green); }
.btn-test {
  padding:5px 10px; border-radius:5px; font-family:inherit; font-size:10px;
  cursor:pointer; border:1px solid var(--border2); background:var(--surface3);
  color:var(--muted); transition:all .15s; white-space:nowrap;
}
.btn-test:hover { border-color:var(--amber); color:var(--amber); }
.btn-open-small {
  padding:5px 8px; border-radius:5px; font-family:inherit; font-size:10px;
  cursor:pointer; border:1px solid rgba(0,212,255,.25); background:var(--accent-dim);
  color:var(--accent); transition:all .15s; white-space:nowrap; text-decoration:none;
}
.btn-open-small:hover { background:rgba(0,212,255,.2); }
.edit-url-feedback {
  font-size:9.5px; margin-top:4px; display:none;
}
.edit-url-feedback.show { display:block; }
.edit-url-feedback.ok { color:var(--green); }
.edit-url-feedback.err { color:var(--red); }

/* BOTTOM TOOLBAR */
.ap-footer {
  padding:14px 20px; border-top:1px solid var(--border);
  display:flex; gap:8px; flex-wrap:wrap;
}
.ap-save {
  flex:1; padding:10px; border-radius:7px; font-family:inherit;
  font-size:12px; cursor:pointer; background:rgba(245,158,11,.12);
  border:1px solid var(--amber); color:var(--amber); font-weight:700;
  letter-spacing:.05em; transition:all .15s;
}
.ap-save:hover { background:rgba(245,158,11,.25); }
.ap-export {
  padding:10px 14px; border-radius:7px; font-family:inherit; font-size:11px;
  cursor:pointer; background:none; border:1px solid var(--border2);
  color:var(--muted); transition:all .15s;
}
.ap-export:hover { color:var(--text); border-color:var(--text2); }
.ap-import-label {
  padding:10px 14px; border-radius:7px; font-family:inherit; font-size:11px;
  cursor:pointer; background:none; border:1px solid var(--border2);
  color:var(--muted); transition:all .15s;
}
.ap-import-label:hover { color:var(--text); border-color:var(--text2); }
#ap-import-file { display:none; }

.ap-saved-msg {

function favicon(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return ''; }
}

function makeLinkCard(link, color) {
  const fav = favicon(link.url);
  // Use a real <a> so the browser handles navigation natively
  const card = document.createElement('a');
  card.className = 'link-card';
  card.href = link.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.setProperty('--hc', color);
  card.innerHTML = `
    <img class="link-favicon" src="${fav}" alt="" onerror="this.style.visibility='hidden'">
    <div class="ltext">
      <span class="lname">${link.name}</span>
      <span class="ldesc">${link.desc}</span>
    </div>
    <div class="card-btns">
      <span class="info-btn" role="button" tabindex="0" title="Mas info">i</span>
      <span class="card-arrow">&#8599;</span>
    </div>
    <div class="tooltip">${link.desc}</div>
  `;
  // info-btn is a <span> so it never triggers the <a> navigation
  card.querySelector('.info-btn').addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    openPanel(link, color, fav);
  });
  return card;
}

function makeDorkCard(dork, color) {
  const card = document.createElement('div');
  card.className = 'dork-card';
  card.innerHTML = `
    <div class="dork-label">${dork.label}</div>
    <div class="dork-code">${dork.query}</div>
    <div class="dork-actions">
      <button class="dork-btn dork-copy">📋 Copiar</button>
      <button class="dork-btn dork-run" style="border-color:${color}44;color:${color}">▶ Ejecutar en Google</button>
    </div>
  `;
  const copyBtn = card.querySelector('.dork-copy');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(dork.query).then(() => {
      copyBtn.textContent = '✓ Copiado';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '📋 Copiar'; copyBtn.classList.remove('copied'); }, 2000);
    });
  });
  card.querySelector('.dork-run').addEventListener('click', () => {
    window.open(`https://www.google.com/search?q=${encodeURIComponent(dork.query)}`, '_blank');
  });
  return card;
}

function makeExtCard(link) {
  const bClass = link.browser === 'chrome' ? 'br-chrome' : link.browser === 'firefox' ? 'br-firefox' : 'br-multi';
  const bLabel = link.browser === 'chrome' ? 'Chrome' : link.browser === 'firefox' ? 'Firefox' : 'Multi';
  const card = document.createElement('div');
  card.className = 'ext-card';
  card.innerHTML = `
    <div class="ext-icon">${link.icon || '🔧'}</div>
    <div class="ext-body">
      <div class="ext-name">${link.name} <span class="ext-browser ${bClass}">${bLabel}</span></div>
      <div class="ext-desc">${link.desc}</div>
      <a class="ext-link" href="${link.url}" target="_blank" rel="noopener">↗ Instalar extensión</a>
    </div>
  `;
  return card;
}

function makeTrainingCard(link) {
  const typeClass = link.type === 'yt' ? 'type-yt' : link.type === 'course' ? 'type-course' : 'type-doc';
  const typeLabel = link.type === 'yt' ? '▶ YouTube' : link.type === 'course' ? '★ Curso' : '📄 Doc';
  const icon = link.type === 'yt' ? '▶' : link.type === 'course' ? '★' : '📄';
  const card = document.createElement('a');
  card.className = 'training-card';
  card.href = link.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.innerHTML = `
    <div class="t-thumb">
      <div class="t-placeholder">${icon}</div>
      <div class="t-play"><div class="play-circle">▶</div></div>
      <span class="t-type ${typeClass}">${typeLabel}</span>
    </div>
    <div class="t-info">
      <div class="t-title">${link.name}</div>
      <div class="t-desc">${link.desc}</div>
    </div>
  `;
  return card;
}

const mainEl = document.getElementById('main');

function renderSection(sec, searchQ) {
  const block = document.createElement('div');
  block.className = 'sec-block';
  block.id = sec.id;

  // header
  let toolCount = 0;
  sec.subs.forEach(sub => { if (!sub.isDorks) toolCount += (sub.links || []).length; });
  block.innerHTML = `
    <div class="sec-header">
      <span class="sec-num">${sec.num}</span>
      <h2 class="sec-title" style="color:${sec.color}">${sec.title}</h2>
      <span class="sec-total">${toolCount} recursos</span>
    </div>
  `;

  // sub-tabs + panels
  const tabsWrap = document.createElement('div');
  tabsWrap.className = 'sub-tabs';

  sec.subs.forEach((sub, idx) => {
    const tab = document.createElement('button');
    tab.className = 'sub-tab' + (idx === 0 ? ' active' : '');
    tab.style.color = sub.isDorks ? sec.color : '';
    tab.textContent = sub.label;
    tab.dataset.idx = idx;
    tabsWrap.appendChild(tab);
  });

  block.appendChild(tabsWrap);

  const panelsWrap = document.createElement('div');

  sec.subs.forEach((sub, idx) => {
    const panel = document.createElement('div');
    panel.className = 'sub-panel' + (idx === 0 ? ' active' : '');
    panel.dataset.idx = idx;

    if (sub.isDorks) {
      const grid = document.createElement('div');
      grid.className = 'dorks-grid';
      (sub.dorks || []).forEach(d => grid.appendChild(makeDorkCard(d, sec.color)));
      panel.appendChild(grid);
    } else if (sec.isExtensions) {
      const grid = document.createElement('div');
      grid.className = 'ext-grid';
      (sub.links || []).forEach(l => grid.appendChild(makeExtCard(l)));
      panel.appendChild(grid);
    } else if (sec.isTraining) {
      const grid = document.createElement('div');
      grid.className = 'training-grid';
      (sub.links || []).forEach(l => grid.appendChild(makeTrainingCard(l)));
      panel.appendChild(grid);
    } else {
      // filter if searching
      const links = searchQ
        ? (sub.links || []).filter(l =>
            l.name.toLowerCase().includes(searchQ) ||
            l.desc.toLowerCase().includes(searchQ) ||
            l.tags.some(t => t.toLowerCase().includes(searchQ)))
        : (sub.links || []);
      if (searchQ && links.length === 0) { panel.style.display = 'none'; return; }
      const grid = document.createElement('div');
      grid.className = 'links-grid';
      links.forEach(l => grid.appendChild(makeLinkCard(l, sec.color)));
      panel.appendChild(grid);
    }

    panelsWrap.appendChild(panel);
  });

  block.appendChild(panelsWrap);

  // tab switching
  tabsWrap.querySelectorAll('.sub-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      tabsWrap.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      panelsWrap.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const target = panelsWrap.querySelector(`[data-idx="${tab.dataset.idx}"]`);
      if (target) target.classList.add('active');
    });
  });

  return block;
}

function render(searchQ = '', filterSec = 'all') {
  mainEl.innerHTML = '';
  const q = searchQ.toLowerCase().trim();
  let found = 0;

  SECTIONS.forEach(sec => {
    if (filterSec !== 'all' && sec.id !== filterSec) return;

    if (q && !sec.isTraining && !sec.isExtensions) {
      // check if any link matches
      let hasMatch = false;
      sec.subs.forEach(sub => {
        if (sub.isDorks) return;
        if ((sub.links || []).some(l =>
          l.name.toLowerCase().includes(q) ||
          l.desc.toLowerCase().includes(q) ||
          l.tags.some(t => t.toLowerCase().includes(q)))) {
          hasMatch = true;
        }
      });
      if (!hasMatch) return;
    }

    const el = renderSection(sec, q || null);
    mainEl.appendChild(el);
  });

  if (mainEl.children.length === 0) {
    mainEl.innerHTML = `<div class="no-results">Sin resultados para "<b>${searchQ}</b>"</div>`;
  }

  const si = document.getElementById('searchInfo');
  if (q) { si.style.display = ''; document.getElementById('foundCount').textContent = mainEl.children.length; }
  else si.style.display = 'none';
}

render();

// Load saved data from localStorage
function loadSavedData() {
  try {
    const saved = localStorage.getItem('osint_s3gad3_links');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge saved URLs into SECTIONS
      parsed.forEach(savedSec => {
        const sec = SECTIONS.find(s => s.id === savedSec.id);
        if (!sec) return;
        savedSec.subs.forEach(savedSub => {
          const sub = sec.subs.find(s => s.label === savedSub.label);
          if (!sub || !sub.links) return;
          savedSub.links.forEach(savedLink => {
            const link = sub.links.find(l => l.name === savedLink.name);
            if (link) {
              link.url = savedLink.url;
              link.name = savedLink.name;
              link.desc = savedLink.desc;
            }
          });
        });
      });
      console.log('[Admin] Loaded saved link data from localStorage');
    }
  } catch(e) { console.warn('[Admin] Could not load saved data', e); }
}

      row.innerHTML = `
        <div class="edit-row-header">
          <span class="edit-status" id="status-${CSS.escape(link.name)}"></span>
          <span class="edit-row-name">${link.name}</span>
        </div>
        <div class="edit-url-wrap">
          <input class="edit-url" type="text" value="${link.url}" data-original="${link.url}" data-linkname="${link.name}" data-secid="${sec.id}" data-sublabel="${sub.label}">
          <button class="btn-test">Probar</button>
          <a class="btn-open-small" href="${link.url}" target="_blank" rel="noopener">↗</a>
        </div>
        <div class="edit-url-feedback"></div>
      `;

      const urlInput = row.querySelector('.edit-url');
      const feedback = row.querySelector('.edit-url-feedback');
      const testBtn = row.querySelector('.btn-test');
      const openBtn = row.querySelector('.btn-open-small');
      const statusDot = row.querySelector('.edit-status');

      // Update open link when URL changes
      urlInput.addEventListener('input', () => {
        const val = urlInput.value.trim();
        openBtn.href = val;
        feedback.className = 'edit-url-feedback';
        feedback.style.display = 'none';
        statusDot.className = 'edit-status';
      });

      // Test button - opens in new tab and marks visually
      testBtn.addEventListener('click', () => {
        const val = urlInput.value.trim();
        if (!val) return;
        statusDot.className = 'edit-status checking';
        feedback.textContent = 'Abriendo para verificar...';
        feedback.className = 'edit-url-feedback show ok';
        window.open(val, '_blank', 'noopener,noreferrer');
        // After 2s show manual confirm buttons
        setTimeout(() => {
          feedback.innerHTML = 'Confirma: <button onclick="markUrl(this, true)" style="margin-left:6px;padding:2px 8px;border-radius:3px;background:rgba(16,185,129,.15);border:1px solid #10b981;color:#10b981;cursor:pointer;font-family:inherit;font-size:10px">✓ Funciona</button> <button onclick="markUrl(this, false)" style="margin-left:4px;padding:2px 8px;border-radius:3px;background:rgba(239,68,68,.15);border:1px solid #ef4444;color:#ef4444;cursor:pointer;font-family:inherit;font-size:10px">✗ No carga</button>';
          feedback.className = 'edit-url-feedback show';
          // store ref for markUrl
          feedback.dataset.inputRef = link.name;
          feedback._urlInput = urlInput;
          feedback._statusDot = statusDot;
        }, 1800);
      });

      bodyEl.appendChild(row);
    });
  });
}

// Called by inline buttons in feedback
function markUrl(btn, works) {
  const feedback = btn.closest('.edit-url-feedback');
  const urlInput = feedback._urlInput;
  const statusDot = feedback._statusDot;
  if (works) {
    urlInput.classList.remove('url-error');
    urlInput.classList.add('url-ok');
    statusDot.className = 'edit-status ok';
    feedback.textContent = '✓ URL verificada como funcional';
    feedback.className = 'edit-url-feedback show ok';
  } else {
    urlInput.classList.remove('url-ok');
    urlInput.classList.add('url-error');
    statusDot.className = 'edit-status error';
    feedback.textContent = '✗ URL marcada como rota — edita la URL arriba';
    feedback.className = 'edit-url-feedback show err';
    urlInput.focus();
    urlInput.select();
  }
}

// Save button
document.getElementById('apSave').addEventListener('click', () => {
  // Collect all edited URLs from inputs
  const allInputs = document.getElementById('apBody').querySelectorAll('.edit-url');
  allInputs.forEach(input => {
    const newUrl = input.value.trim();
    const secId = input.dataset.secid;
    const subLabel = input.dataset.sublabel;
    const linkName = input.dataset.linkname;
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) return;
    const sub = sec.subs.find(s => s.label === subLabel);
    if (!sub || !sub.links) return;
    const link = sub.links.find(l => l.name === linkName);
    if (link && newUrl) link.url = newUrl;
  });

  // Persist to localStorage
  const saveData = SECTIONS.filter(s => !s.isExtensions && !s.isTraining).map(sec => ({
    id: sec.id,
    subs: sec.subs.filter(sub => !sub.isDorks && sub.links).map(sub => ({
      label: sub.label,
      links: sub.links.map(l => ({ name: l.name, url: l.url, desc: l.desc }))
    }))
  }));
  localStorage.setItem('osint_s3gad3_links', JSON.stringify(saveData));

  // Show saved message
  const msg = document.getElementById('apSavedMsg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 3000);

  // Re-render main view
  render('', activeSec);
});

// Export JSON
document.getElementById('apExport').addEventListener('click', () => {
  const saveData = SECTIONS.filter(s => !s.isExtensions && !s.isTraining).map(sec => ({
    id: sec.id, title: sec.title,
    subs: sec.subs.filter(sub => !sub.isDorks && sub.links).map(sub => ({
      label: sub.label,
      links: sub.links.map(l => ({ name: l.name, url: l.url, desc: l.desc, tags: l.tags }))
    }))
  }));
  const blob = new Blob([JSON.stringify(saveData, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'osint-s3gad3-links.json';
  a.click();
});

// Import JSON
document.getElementById('ap-import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      parsed.forEach(savedSec => {
        const sec = SECTIONS.find(s => s.id === savedSec.id);
        if (!sec) return;
        savedSec.subs.forEach(savedSub => {
          const sub = sec.subs.find(s => s.label === savedSub.label);
          if (!sub || !sub.links) return;
          savedSub.links.forEach(savedLink => {
            const link = sub.links.find(l => l.name === savedLink.name);
            if (link) { link.url = savedLink.url; link.desc = savedLink.desc; }
          });
        });
      });
      localStorage.setItem('osint_s3gad3_links', JSON.stringify(parsed));
      buildAdminPanel();
      render('', activeSec);
      alert('Importacion completada correctamente.');
    } catch(err) { alert('Error al importar: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

</script>
